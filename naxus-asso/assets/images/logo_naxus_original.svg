<svg viewBox="0 0 200 200" width="800" height="800" fill="none" xmlns="http://www.w3.org/2000/svg" style="background-color: transparent; font-family: 'DM Sans', system-ui, sans-serif;">
    <!-- Connexions -->
    <line x1="100" y1="100" x2="40"  y2="44"  stroke="#378ADD" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="100" x2="160" y2="44"  stroke="#7F77DD" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="100" x2="34"  y2="144" stroke="#1D9E75" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="100" x2="166" y2="144" stroke="#D4537E" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="100" x2="100" y2="178" stroke="#EF9F27" stroke-width="1.5" opacity="0.7"/>
    <!-- Tirets secondaires -->
    <line x1="40"  y1="44"  x2="34"  y2="144" stroke="#378ADD" stroke-width="0.7" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="160" y1="44"  x2="166" y2="144" stroke="#7F77DD" stroke-width="0.7" stroke-dasharray="4 4" opacity="0.3"/>
    <line x1="40"  y1="44"  x2="160" y2="44"  stroke="#378ADD" stroke-width="0.7" stroke-dasharray="4 4" opacity="0.2"/>
    <!-- Nœuds satellites -->
    <circle cx="40"  cy="44"  r="11" fill="#378ADD" opacity="0.18"/><circle cx="40"  cy="44"  r="11" fill="none" stroke="#378ADD" stroke-width="1.8"/>
    <circle cx="160" cy="44"  r="11" fill="#7F77DD" opacity="0.18"/><circle cx="160" cy="44"  r="11" fill="none" stroke="#7F77DD" stroke-width="1.8"/>
    <circle cx="34"  cy="144" r="9"  fill="#1D9E75" opacity="0.18"/><circle cx="34"  cy="144" r="9"  fill="none" stroke="#1D9E75" stroke-width="1.8"/>
    <circle cx="166" cy="144" r="9"  fill="#D4537E" opacity="0.18"/><circle cx="166" cy="144" r="9"  fill="none" stroke="#D4537E" stroke-width="1.8"/>
    <circle cx="100" cy="178" r="9"  fill="#EF9F27" opacity="0.18"/><circle cx="100" cy="178" r="9"  fill="none" stroke="#EF9F27" stroke-width="1.8"/>
    <!-- Nœud central -->
    <circle cx="100" cy="100" r="36" fill="#378ADD" opacity="0.1"/>
    <circle cx="100" cy="100" r="36" fill="none" stroke="#378ADD" stroke-width="2.2" opacity="0.9"/>
    <circle cx="100" cy="100" r="44" fill="none" stroke="#378ADD" stroke-width="0.8" opacity="0.35"/>
    <!-- Icônes nœuds -->
    <text x="40"  y="49"  font-family="monospace" font-size="10" fill="#378ADD" text-anchor="middle">C</text>
    <text x="160" y="49"  font-family="monospace" font-size="10" fill="#7F77DD" text-anchor="middle">S</text>
    <text x="34"  y="149" font-family="monospace" font-size="9"  fill="#1D9E75" text-anchor="middle">R</text>
    <text x="166" y="149" font-family="monospace" font-size="9"  fill="#D4537E" text-anchor="middle">D</text>
    <text x="100" y="183" font-family="monospace" font-size="9"  fill="#EF9F27" text-anchor="middle">A</text>
    <!-- Texte central -->
    <text x="100" y="95"  font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#378ADD" text-anchor="middle" letter-spacing="3">NAXUS</text>
    <text x="100" y="112" font-family="monospace" font-size="9"  fill="#378ADD" text-anchor="middle" opacity="0.6" letter-spacing="4">ASSO.</text>
</svg>
